<!DOCTYPE html>
<html>
<head>
<title>Canarinho Imports</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

.categoria-btn{
width:100px;
height:100px;
border-radius:50%;
border:none;
background:#FFD700;
color:black;
font-weight:bold;
cursor:pointer;
margin:10px;
font-size:14px;
display:inline-flex;
align-items:center;
justify-content:center;
text-align:center;
transition:0.3s;
}

.categoria-btn:hover{
background:black;
color:white;
}

</style>

</head>

<body style="font-family: Arial; background:#f5f5f5; padding:40px;">

<h1>Canarinho Imports</h1>
<p>Chuteiras, camisas de time e produtos esportivos</p>

<button class="categoria-btn" onclick="carregarProdutos()">Todos</button>

<button class="categoria-btn" onclick="carregarProdutos('Camisas')">
Camisas
</button>

<button class="categoria-btn" onclick="carregarProdutos('Chuteiras')">
Chuteiras
</button>

<button class="categoria-btn" onclick="carregarProdutos('Acessórios')">
Acessórios
</button>

<div id="produtos"></div>

<script>

const supabaseClient = window.supabase.createClient(
'https://lqxbkppnpxoqjmemtzaa.supabase.co',
'sb_publishable_0RjCGW-lRmu_cgVY5J07UA_p48suAeh'
)

async function carregarProdutos(categoria){

let query = supabaseClient
.from('Produtos')
.select('*')

if(categoria){
query = query.eq('categoria', categoria)
}

const { data, error } = await query

if(error){
console.log(error)
return
}

const container = document.getElementById("produtos")
container.innerHTML = ""

data.forEach(produto => {

const card = document.createElement("div")

card.style.border = "1px solid #ddd"
card.style.padding = "15px"
card.style.margin = "10px"
card.style.background = "white"
card.style.width = "250px"
card.style.display = "inline-block"
card.style.verticalAlign = "top"

card.innerHTML = `
<img src="${produto.imagem}" style="width:100%;">
<h3>${produto.nome}</h3>
<p>${produto.descricao}</p>
<p>Marca: ${produto.marca}</p>
<p>Categoria: ${produto.categoria}</p>
<p>Preço: R$ ${produto.preco}</p>

<a href="https://wa.me/5584981685355?text=Olá%20tenho%20interesse%20no%20produto%20${produto.nome}" target="_blank">
<button style="padding:10px;background:#25D366;color:white;border:none;cursor:pointer;">
Comprar no WhatsApp
</button>
</a>
`

container.appendChild(card)

})

}

carregarProdutos()

</script>

</body>
</html>

</body>
</html>
