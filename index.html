<!DOCTYPE html>
<html>

<head>
  
  <style>

#produtos{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
margin-top:30px;
}

.produto-card{
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
text-align:center;
}

card.classname.produto-card img{
width:100%;
border-radius:8px;
}

</style>

</head>
  
<title>Canarinho Imports</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body style="font-family: Arial; background:#f5f5f5; padding:40px;">

<h1>Canarinho Imports</h1>
<p>Chuteiras, camisas de time e produtos esportivos</p>

<div id="produtos"></div>

<script>

const supabaseClient = window.supabase.createClient(
'https://lqxbkppnpxoqjmemtzaa.supabase.co',
'sb_publishable_0RjCGW-lRmu_cgVY5J07UA_p48suAeh'
)

async function carregarProdutos(){

const { data, error } = await supabaseClient
.from('Produtos')
.select('*')

if(error){
console.log(error)
return
}

const container = document.getElementById("produtos")

data.forEach(produto => {

const card = document.createElement("div")

card.style.border = "1px solid #ddd"
card.style.padding = "15px"
card.style.margin = "10px"
card.style.background = "white"

card.innerHTML = `
<img src="${produto.imagem}" width="200">
<h3>${produto.nome}</h3>
<p>${produto.descricao}</p>
<p><strong>Marca:</strong> ${produto.marca}</p>
<p><strong>Preço:</strong> R$ ${produto.preco}</p>
`
`
`

container.appendChild(card)

})

}

carregarProdutos()

</script>

</body>
</html>
