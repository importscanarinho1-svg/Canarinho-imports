<!DOCTYPE html>
<html>

<head>

<title>Canarinho Imports</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&display=swap" rel="stylesheet">

<style>

body{
font-family:Arial;
background:#f2f2f2;
margin:0;
padding:0;
}

/* HEADER */

.header{
display:flex;
align-items:center;
justify-content:space-between;
background:#000;
padding:10px 30px;
height:160px;
color:white;
}

.menu{
font-size:32px;
cursor:pointer;
}

/* LOGO GRANDE */

.logo{
height:150px;
width:auto;
}

/* PESQUISA */

.barra-pesquisa{
display:flex;
background:white;
border-radius:40px;
padding:8px 15px;
width:40%;
box-shadow:0 3px 10px rgba(0,0,0,0.2);
}

.barra-pesquisa input{
border:none;
outline:none;
flex:1;
padding:8px;
font-size:15px;
}

.barra-pesquisa button{
border:none;
background:none;
cursor:pointer;
font-size:18px;
}

/* CARRINHO */

.icones{
display:flex;
align-items:center;
gap:20px;
}

.carrinho{
background:#FFD400;
padding:10px 15px;
border-radius:20px;
font-weight:bold;
cursor:pointer;
color:black;
}

/* MENU LATERAL */

.menu-lateral{
position:fixed;
top:0;
left:-300px;
width:260px;
height:100vh;
background:#111;
color:white;
padding:30px 20px;
transition:0.3s;
z-index:3000;
box-shadow:5px 0px 20px rgba(0,0,0,0.6);
}

.menu-lateral h3{
margin-bottom:20px;
font-size:22px;
}

.menu-lateral button{
width:100%;
padding:14px;
margin-bottom:12px;
border:none;
background:#FFD400;
font-weight:bold;
cursor:pointer;
border-radius:8px;
font-size:15px;
}

/* BANNER */

.banner{
margin:20px;
}

.banner img{
width:100%;
border-radius:10px;
}

/* PRODUTOS */

#produtos{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
padding:20px;
}

.produto{
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.05);
}

.produto img{
width:100%;
border-radius:8px;
}

.add-carrinho{
background:#FFD400;
border:none;
padding:10px;
width:100%;
margin-top:10px;
cursor:pointer;
border-radius:6px;
font-weight:bold;
}

.whatsapp-btn{
background:#25D366;
border:none;
padding:10px;
width:100%;
margin-top:10px;
cursor:pointer;
border-radius:6px;
color:white;
font-weight:bold;
}

/* CARRINHO */

#painel-carrinho{
display:none;
position:fixed;
top:180px;
right:20px;
width:300px;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

/* WHATSAPP FIXO */

.whatsapp-fixo{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:white;
font-size:28px;
padding:15px;
border-radius:50%;
text-decoration:none;
}

/* RESPONSIVO */

@media(max-width:900px){

#produtos{
grid-template-columns:repeat(2,1fr);
}

}

@media(max-width:600px){

#produtos{
grid-template-columns:1fr;
}

.barra-pesquisa{
width:50%;
}

.logo{
height:100px;
}

.header{
height:120px;
}

}

</style>

</head>

<body>

<!-- MENU LATERAL -->

<div id="menu-lateral" class="menu-lateral">

<button onclick="fecharMenu()" style="background:red;color:white;margin-bottom:20px;">
Fechar
</button>

<h3>Categorias</h3>

<button onclick="carregarProdutos(); fecharMenu()">Todos</button>

<button onclick="carregarProdutos('Chuteiras Mais Vendidas'); fecharMenu()">
Chuteiras Mais Vendidas
</button>

<button onclick="carregarProdutos('Camisas'); fecharMenu()">
Camisas
</button>

<button onclick="carregarProdutos('Trava Mista'); fecharMenu()">
Trava Mista
</button>

</div>

<!-- HEADER -->

<div class="header">

<div class="menu" onclick="abrirMenu()">☰</div>

<img src="logo.png" class="logo">

<div class="barra-pesquisa">

<input type="text" id="pesquisa" placeholder="O que está buscando?">

<button onclick="pesquisarProduto()">🔍</button>

</div>

<div class="icones">

<div class="carrinho" onclick="abrirCarrinho()">
🛒 <span id="contador">0</span>
</div>

</div>

</div>

<!-- BANNER -->

<div class="banner">
<img src="banner.jpg">
</div>

<!-- PRODUTOS -->

<div id="produtos"></div>

<!-- CARRINHO -->

<div id="painel-carrinho">

<h3>Seu Carrinho</h3>

<div id="lista-carrinho"></div>

<br>

<button onclick="finalizarWhatsApp()" style="width:100%; padding:10px; background:#25D366; color:white; border:none; border-radius:6px;">
Finalizar no WhatsApp
</button>

</div>

<!-- WHATSAPP -->

<a href="https://wa.me/5584981685355" class="whatsapp-fixo" target="_blank">
💬
</a>

<script>

const supabaseClient = window.supabase.createClient(
'https://lqxbkppnpxoqjmemtzaa.supabase.co',
'sb_publishable_0RjCGW-lRmu_cgVY5J07UA_p48suAeh'
)

let carrinho=[]

function abrirMenu(){
document.getElementById("menu-lateral").style.left="0"
}

function fecharMenu(){
document.getElementById("menu-lateral").style.left="-300px"
}

/* PESQUISA */

function pesquisarProduto(){

const termo=document.getElementById("pesquisa").value.toLowerCase()

const produtos=document.querySelectorAll(".produto")

produtos.forEach(produto=>{

const texto=produto.innerText.toLowerCase()

if(texto.includes(termo)){
produto.style.display="block"
}else{
produto.style.display="none"
}

})

}

document.getElementById("pesquisa").addEventListener("keypress",function(e){

if(e.key==="Enter"){
pesquisarProduto()
}

})

/* CARRINHO */

function adicionarCarrinho(nome,preco){

carrinho.push({nome,preco})

document.getElementById("contador").innerText=carrinho.length

atualizarCarrinho()

}

function abrirCarrinho(){

const painel=document.getElementById("painel-carrinho")

painel.style.display=painel.style.display==="block"?"none":"block"

}

function atualizarCarrinho(){

const lista=document.getElementById("lista-carrinho")

lista.innerHTML=""

let total=0

carrinho.forEach((item,index)=>{

total+=Number(item.preco)

const linha=document.createElement("div")

linha.style.display="flex"
linha.style.justifyContent="space-between"

linha.innerHTML=`
<span>${item.nome} - R$ ${item.preco}</span>
<button onclick="removerItem(${index})">X</button>
`

lista.appendChild(linha)

})

const totalDiv=document.createElement("h4")

totalDiv.innerText="Total: R$ "+total.toFixed(2)

lista.appendChild(totalDiv)

}

function removerItem(index){

carrinho.splice(index,1)

document.getElementById("contador").innerText=carrinho.length

atualizarCarrinho()

}

function finalizarWhatsApp(){

let mensagem="Olá, gostaria de comprar:%0A%0A"

let total=0

carrinho.forEach(item=>{
mensagem+="- "+item.nome+" (R$ "+item.preco+")%0A"
total+=Number(item.preco)
})

mensagem+="%0ATotal: R$ "+total.toFixed(2)

window.open("https://wa.me/5584981685355?text="+mensagem,"_blank")

}

/* PRODUTOS */

async function carregarProdutos(categoria){

let query=supabaseClient.from('Produtos').select('*')

if(categoria){
query=query.eq('categoria',categoria)
}

const {data,error}=await query

if(error){
console.log(error)
return
}

const container=document.getElementById("produtos")

container.innerHTML=""

data.forEach(produto=>{

const card=document.createElement("div")

card.classList.add("produto")

card.innerHTML=`
<img src="${produto.imagem}">
<h3>${produto.nome}</h3>
<p>${produto.descricao}</p>
<p>Marca: ${produto.marca}</p>
<p><strong>R$ ${produto.preco}</strong></p>

<button class="add-carrinho" onclick="adicionarCarrinho('${produto.nome}',${produto.preco})">
Adicionar ao carrinho
</button>

<a href="https://wa.me/5584981685355?text=Olá%20tenho%20interesse%20no%20produto%20${produto.nome}" target="_blank">
<button class="whatsapp-btn">
Comprar no WhatsApp
</button>
</a>
`

container.appendChild(card)

})

}

carregarProdutos()

</script>

</body>
</html>
