<!DOCTYPE html>
<html>

<head>

<title>Canarinho Imports</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&display=swap" rel="stylesheet">

<style>

body{
font-family:Arial;
background:#f2f2f2;
margin:0;
padding:0;
}

.header{
display:flex;
align-items:center;
justify-content:space-between;
background:#000;
padding:10px 30px;
height:160px;
color:white;
}

.menu{font-size:32px;cursor:pointer;}
.logo{height:290px;}

.barra-pesquisa{
display:flex;
background:white;
border-radius:40px;
padding:8px 15px;
width:40%;
box-shadow:0 3px 10px rgba(0,0,0,0.2);
}

.barra-pesquisa input{
border:none;
outline:none;
flex:1;
padding:8px;
}

.icones{display:flex;gap:20px;}

.carrinho{
background:#FFD400;
padding:10px 15px;
border-radius:20px;
font-weight:bold;
cursor:pointer;
color:black;
}

.menu-lateral{
position:fixed;
top:0;
left:-300px;
width:260px;
height:100vh;
background:#111;
color:white;
padding:30px 20px;
transition:0.3s;
z-index:3000;
}

.menu-lateral button{
width:100%;
padding:14px;
margin-bottom:12px;
border:none;
background:#FFD400;
font-weight:bold;
cursor:pointer;
}

.banner img{width:100%;border-radius:10px;}

.produtos-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
padding:20px;
}

.produto{
background:white;
padding:15px;
border-radius:10px;
}

.produto img{width:100%;}

.add-carrinho,.whatsapp-btn{
width:100%;
padding:10px;
margin-top:10px;
border:none;
cursor:pointer;
}

.add-carrinho{background:#FFD400;}
.whatsapp-btn{background:#25D366;color:white;}

#painel-carrinho{
display:none;
position:fixed;
top:180px;
right:20px;
width:300px;
background:white;
padding:20px;
}

.whatsapp-fixo{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:white;
padding:15px;
border-radius:50%;
}

/* NOVA SEÇÃO */

.beneficios{
background:#000;
color:white;
display:flex;
justify-content:space-around;
padding:50px;
flex-wrap:wrap;
text-align:center;
}

.beneficio{max-width:250px;}

.icone{
width:80px;
height:80px;
background:#ddd;
color:black;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
margin:0 auto 15px;
}

</style>

</head>

<body>

<div class="header">
<div class="menu" onclick="abrirMenu()">☰</div>
<img src="logo.png" class="logo">

<div class="barra-pesquisa">
<input id="pesquisa">
</div>

<div class="carrinho" onclick="abrirCarrinho()">🛒 <span id="contador">0</span></div>
</div>

<div class="banner">
<img src="banner.jpg">
</div>

<h2>Camisas</h2>
<div id="camisas" class="produtos-grid"></div>

<h2>Chuteiras</h2>
<div id="chuteiras" class="produtos-grid"></div>

<h2>Trava Mista</h2>
<div id="trava" class="produtos-grid"></div>

<!-- NOVO BLOCO -->

<div class="beneficios">
<div class="beneficio"><div class="icone">🚚</div>Entrega Garantida</div>
<div class="beneficio"><div class="icone">💳</div>Pagamento Seguro</div>
<div class="beneficio"><div class="icone">📦</div>Qualidade</div>
<div class="beneficio"><div class="icone">↩</div>Devolução</div>
</div>

<div id="painel-carrinho">
<div id="lista-carrinho"></div>
</div>

<script>

const supabaseClient = window.supabase.createClient(
'https://lqxbkppnpxoqjmemtzaa.supabase.co',
'sb_publishable_0RjCGW-lRmu_cgVY5J07UA_p48suAeh'
)

let carrinho=[]

function adicionarCarrinho(nome,preco){
carrinho.push({nome,preco})
document.getElementById("contador").innerText=carrinho.length
}

function abrirCarrinho(){
const painel=document.getElementById("painel-carrinho")
painel.style.display=painel.style.display==="block"?"none":"block"
}

async function carregarProdutos(){

const {data} = await supabaseClient
.from('Produtos')
.select('*')

data.forEach(produto=>{

const card=document.createElement("div")
card.classList.add("produto")

card.innerHTML = `
<img src="${produto.imagem}">
<h3>${produto.nome}</h3>
<p>R$ ${produto.preco}</p>

<button class="add-carrinho" onclick="adicionarCarrinho('${produto.nome}',${produto.preco})">
Adicionar
</button>

<a href="https://wa.me/5584981685355?text=Quero ${produto.nome}">
<button class="whatsapp-btn">Comprar</button>
</a>
`

if(produto.categoria==="Camisas de Time + Vendidas"){
document.getElementById("camisas").appendChild(card)
}

if(produto.categoria==="Chuteiras Mais Vendidas"){
document.getElementById("chuteiras").appendChild(card)
}

if(produto.categoria==="Trava Mista"){
document.getElementById("trava").appendChild(card)
}

})

}

carregarProdutos()

</script>

</body>
</html>
