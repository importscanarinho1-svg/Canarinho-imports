<!DOCTYPE html>
<html>

<head>

<title>Canarinho Imports</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&display=swap" rel="stylesheet">

<style>

body{
font-family: Arial;
background:#f2f2f2;
padding:40px;
color:#111111;
}

/* TOPO */

.topo{
display:flex;
justify-content:space-between;
align-items:center;
}

h1{
font-family:'Montserrat', sans-serif;
font-size:42px;
color:#111111;
}

.carrinho{
background:#FFD400;
padding:10px 15px;
border-radius:8px;
font-weight:bold;
font-size:20px;
cursor:pointer;
position:relative;
}

.carrinho.animar{
transform:scale(1.2);
transition:0.2s;
}

/* PAINEL CARRINHO */

#painel-carrinho{
display:none;
position:fixed;
top:80px;
right:40px;
width:300px;
background:white;
border-radius:10px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
padding:20px;
}

/* BANNER */

.banner{
width:100%;
margin:25px 0;
border-radius:12px;
overflow:hidden;
box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

.banner img{
width:100%;
display:block;
}

/* BOTÕES */

.categoria-btn{
width:120px;
height:120px;
border-radius:50%;
border:none;
background:#FFD400;
font-weight:bold;
margin:10px;
cursor:pointer;
font-size:16px;
transition:0.2s;
}

.categoria-btn:hover{
transform:scale(1.05);
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

/* GRID PRODUTOS */

#produtos{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
margin-top:20px;
}

.produto{
border:1px solid #e0e0e0;
padding:15px;
background:#ffffff;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.05);
}

.produto img{
width:100%;
border-radius:8px;
}

.add-carrinho{
padding:10px;
background:#FFD400;
border:none;
cursor:pointer;
width:100%;
border-radius:6px;
font-weight:bold;
margin-bottom:10px;
}

.whatsapp-btn{
padding:10px;
background:#25D366;
color:white;
border:none;
cursor:pointer;
width:100%;
border-radius:6px;
font-weight:bold;
}

/* BOTÃO WHATSAPP FLUTUANTE */

.whatsapp-fixo{
position:fixed;
bottom:25px;
right:25px;
background:#25D366;
color:white;
font-size:28px;
padding:15px;
border-radius:50%;
text-decoration:none;
box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

/* RESPONSIVO */

@media (max-width:900px){
#produtos{
grid-template-columns:repeat(2,1fr);
}
}

@media (max-width:600px){
#produtos{
grid-template-columns:1fr;
}
}

</style>

</head>

<body>

<div class="topo">

<h1>Canarinho Imports</h1>

<div class="carrinho" onclick="abrirCarrinho()" id="icone-carrinho">
🛒 <span id="contador">0</span>
</div>

</div>

<p>Chuteiras, camisas de time e produtos esportivos</p>

<div class="banner">
<img src="banner.jpg">
</div>

<button class="categoria-btn" onclick="carregarProdutos()">Todos</button>
<button class="categoria-btn" onclick="carregarProdutos('Camisas')">Camisas</button>
<button class="categoria-btn" onclick="carregarProdutos('Chuteiras Mais Vendidas')">Chuteiras Mais Vendidas</button>
<button class="categoria-btn" onclick="carregarProdutos('Acessórios')">Acessórios</button>

<br><br>

<div id="produtos"></div>

<!-- CARRINHO -->

<div id="painel-carrinho">

<h3>Seu Carrinho</h3>

<div id="lista-carrinho"></div>

<br>

<button onclick="finalizarWhatsApp()" style="width:100%; padding:10px; background:#25D366; color:white; border:none; border-radius:6px; font-weight:bold;">
Finalizar no WhatsApp
</button>

</div>

<!-- BOTÃO WHATSAPP -->

<a href="https://wa.me/5584981685355" class="whatsapp-fixo" target="_blank">
💬
</a>

<script>

const supabaseClient = window.supabase.createClient(
'https://lqxbkppnpxoqjmemtzaa.supabase.co',
'sb_publishable_0RjCGW-lRmu_cgVY5J07UA_p48suAeh'
)

let carrinho = []

function adicionarCarrinho(nome, preco){

carrinho.push({nome, preco})

document.getElementById("contador").innerText = carrinho.length

animarCarrinho()

atualizarCarrinho()

}

function animarCarrinho(){

const icone = document.getElementById("icone-carrinho")

icone.classList.add("animar")

setTimeout(()=>{
icone.classList.remove("animar")
},200)

}

function abrirCarrinho(){

const painel = document.getElementById("painel-carrinho")

painel.style.display = painel.style.display === "block" ? "none" : "block"

}

function atualizarCarrinho(){

const lista = document.getElementById("lista-carrinho")

lista.innerHTML = ""

let total = 0

carrinho.forEach((item,index)=>{

total += Number(item.preco)

const linha = document.createElement("div")

linha.style.display="flex"
linha.style.justifyContent="space-between"
linha.style.marginBottom="8px"

linha.innerHTML=`
<span>${item.nome} - R$ ${item.preco}</span>
<button onclick="removerItem(${index})" style="background:red;color:white;border:none;border-radius:4px;">X</button>
`

lista.appendChild(linha)

})

const hr = document.createElement("hr")
lista.appendChild(hr)

const totalDiv = document.createElement("h4")
totalDiv.innerText="Total: R$ "+total.toFixed(2)

lista.appendChild(totalDiv)

}

function removerItem(index){

carrinho.splice(index,1)

document.getElementById("contador").innerText = carrinho.length

atualizarCarrinho()

}

function finalizarWhatsApp(){

let mensagem="Olá, gostaria de comprar:%0A%0A"

let total=0

carrinho.forEach(item=>{

mensagem += "- "+item.nome+" (R$ "+item.preco+")%0A"

total += Number(item.preco)

})

mensagem += "%0ATotal: R$ "+total.toFixed(2)

window.open(
"https://wa.me/5584981685355?text="+mensagem,
"_blank"
)

}

async function carregarProdutos(categoria){

let query = supabaseClient
.from('Produtos')
.select('*')

if(categoria){
query=query.eq('categoria',categoria)
}

const {data,error}=await query

if(error){
console.log(error)
return
}

const container=document.getElementById("produtos")
container.innerHTML=""

data.forEach(produto=>{

const card=document.createElement("div")
card.classList.add("produto")

card.innerHTML=`
<img src="${produto.imagem}">
<h3>${produto.nome}</h3>
<p>${produto.descricao}</p>
<p>Marca: ${produto.marca}</p>
<p>Categoria: ${produto.categoria || "Não definida"}</p>
<p><strong>Preço: R$ ${produto.preco}</strong></p>

<button class="add-carrinho" onclick="adicionarCarrinho('${produto.nome}', ${produto.preco})">
Adicionar ao carrinho
</button>

<a href="https://wa.me/5584981685355?text=Olá%20tenho%20interesse%20no%20produto%20${produto.nome}" target="_blank">
<button class="whatsapp-btn">
Comprar no WhatsApp
</button>
</a>
`

container.appendChild(card)

})

}

carregarProdutos()

</script>

</body>

</html>
</body>

</html>
