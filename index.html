<!DOCTYPE html>
<html>

<head>

<title>Canarinho Imports</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
font-family:Arial;
background:#f2f2f2;
margin:0;
padding:0;
}

/* HEADER */

.header{
display:flex;
align-items:center;
justify-content:space-between;
background:#000;
padding:10px 30px;
height:160px;
color:white;
}

.menu{
font-size:32px;
cursor:pointer;
}

.logo{
height:200px;
}

.barra-pesquisa{
display:flex;
background:white;
border-radius:40px;
padding:8px 15px;
width:40%;
}

.barra-pesquisa input{
border:none;
outline:none;
flex:1;
}

.carrinho{
background:#FFD400;
padding:10px 15px;
border-radius:20px;
font-weight:bold;
cursor:pointer;
color:black;
}

/* MENU */

.menu-lateral{
position:fixed;
top:0;
left:-300px;
width:260px;
height:100vh;
background:#111;
color:white;
padding:30px 20px;
transition:0.3s;
z-index:3000;
}

.menu-lateral button{
width:100%;
padding:14px;
margin-bottom:12px;
border:none;
background:#FFD400;
font-weight:bold;
cursor:pointer;
}

/* BANNER */

.banner{
margin:20px;
}

.banner img{
width:100%;
border-radius:10px;
}

/* PRODUTOS */

.produtos-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
padding:20px;
}

.produto{
background:white;
padding:15px;
border-radius:10px;
}

.produto img{
width:100%;
}

.preco-normal{
font-size:20px;
font-weight:bold;
}

.preco-pix{
color:green;
font-weight:bold;
}

.parcela{
font-size:14px;
color:#555;
}

.add-carrinho{
background:#FFD400;
border:none;
padding:10px;
width:100%;
margin-top:10px;
cursor:pointer;
}

.whatsapp-btn{
background:#25D366;
border:none;
padding:10px;
width:100%;
margin-top:10px;
cursor:pointer;
color:white;
}

/* CARRINHO */

#painel-carrinho{
display:none;
position:fixed;
top:180px;
right:20px;
width:300px;
background:white;
padding:20px;
border-radius:10px;
}

</style>

</head>

<body>

<div class="header">

<div class="menu" onclick="abrirMenu()">☰</div>

<img src="logo.png" class="logo">

<div class="barra-pesquisa">
<input type="text" id="pesquisa" placeholder="Buscar produto">
</div>

<div class="carrinho" onclick="abrirCarrinho()">🛒 <span id="contador">0</span></div>

</div>

<div class="banner">
<img src="banner.jpg">
</div>

<div id="produtos" class="produtos-grid"></div>

<div id="painel-carrinho">

<h3>Seu Carrinho</h3>

<div id="lista-carrinho"></div>

<br>

<button onclick="finalizarWhatsApp()" style="width:100%;padding:10px;background:#25D366;color:white;border:none;">
Finalizar no WhatsApp
</button>

</div>

<script>

const supabaseClient = window.supabase.createClient(
'https://lqxbkppnpxoqjmemtzaa.supabase.co',
'sb_publishable_0RjCGW-lRmu_cgVY5J07UA_p48suAeh'
)

let carrinho=[]

function adicionarCarrinho(nome,preco){

carrinho.push({nome,preco})

document.getElementById("contador").innerText=carrinho.length

atualizarCarrinho()

}

function abrirCarrinho(){

const painel=document.getElementById("painel-carrinho")

painel.style.display=painel.style.display==="block"?"none":"block"

}

function atualizarCarrinho(){

const lista=document.getElementById("lista-carrinho")

lista.innerHTML=""

let total=0

carrinho.forEach(item=>{

total+=Number(item.preco)

const linha=document.createElement("div")

linha.innerText=item.nome+" - R$ "+item.preco

lista.appendChild(linha)

})

const totalDiv=document.createElement("h4")

totalDiv.innerText="Total: R$ "+total.toFixed(2)

lista.appendChild(totalDiv)

}

function finalizarWhatsApp(){

let mensagem="Olá gostaria de comprar:%0A"

let total=0

carrinho.forEach(item=>{

mensagem+="- "+item.nome+" R$"+item.preco+"%0A"

total+=Number(item.preco)

})

mensagem+="Total: R$ "+total.toFixed(2)

window.open("https://wa.me/5584981685355?text="+mensagem)

}

/* PRODUTOS */

async function carregarProdutos(){

const {data}=await supabaseClient
.from('Produtos')
.select('*')

data.forEach(produto=>{

const preco = Number(produto.preco)

const pix = preco * 0.95

const parcela = preco / 6

const card=document.createElement("div")

card.classList.add("produto")

card.innerHTML=`

<img src="${produto.imagem}">

<h3>${produto.nome}</h3>

<div class="preco-normal">
R$ ${preco.toFixed(2)}
</div>

<div class="preco-pix">
R$ ${pix.toFixed(2)} no Pix
</div>

<div class="parcela">
ou 6x de ${parcela.toFixed(2)}
</div>

<button class="add-carrinho"
onclick="adicionarCarrinho('${produto.nome}',${preco})">

Adicionar ao carrinho

</button>

<a href="https://wa.me/5584981685355?text=Olá tenho interesse no produto ${produto.nome}" target="_blank">

<button class="whatsapp-btn">

Comprar no WhatsApp

</button>

</a>
`

document.getElementById("produtos").appendChild(card)

})

}

carregarProdutos()

</script>

</body>
</html>
