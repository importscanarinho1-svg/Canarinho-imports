<!DOCTYPE html>
<html>

<head>

<title>Canarinho Imports</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&display=swap" rel="stylesheet">

<style>

body{
font-family: Arial;
background:#f2f2f2;
padding:40px;
color:#111111;
}

h1{
font-family:'Montserrat', sans-serif;
font-size:42px;
color:#111111;
}

.banner{
width:100%;
margin:25px 0;
border-radius:12px;
overflow:hidden;
box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

.banner img{
width:100%;
display:block;
}

.categoria-btn{
width:120px;
height:120px;
border-radius:50%;
border:none;
background:#FFD400;
font-weight:bold;
margin:10px;
cursor:pointer;
font-size:16px;
color:#111;
transition:0.2s;
}

.categoria-btn:hover{
transform:scale(1.05);
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

/* GRID DOS PRODUTOS */

#produtos{
display:grid;
grid-template-columns:repeat(3, 1fr);
gap:20px;
margin-top:20px;
}

/* CARD DO PRODUTO */

.produto{
border:1px solid #e0e0e0;
padding:15px;
background:#ffffff;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.05);
}

.produto img{
width:100%;
border-radius:8px;
}

.whatsapp-btn{
padding:10px;
background:#25D366;
color:white;
border:none;
cursor:pointer;
width:100%;
border-radius:6px;
font-weight:bold;
transition:0.2s;
}

.whatsapp-btn:hover{
background:#1ebe5d;
}

/* RESPONSIVO */

@media (max-width:900px){
#produtos{
grid-template-columns:repeat(2,1fr);
}
}

@media (max-width:600px){
#produtos{
grid-template-columns:1fr;
}
}

</style>

</head>

<body>

<h1>Canarinho Imports</h1>

<p>Chuteiras, camisas de time e produtos esportivos</p>

<div class="banner">
<img src="banner.jpg">
</div>

<button class="categoria-btn" onclick="carregarProdutos()">Todos</button>

<button class="categoria-btn" onclick="carregarProdutos('Camisas')">
Camisas
</button>

<button class="categoria-btn" onclick="carregarProdutos('Chuteiras Mais Vendidas')">
Chuteiras Mais Vendidas
</button>

<button class="categoria-btn" onclick="carregarProdutos('Acessórios')">
Acessórios
</button>

<br><br>

<div id="produtos"></div>

<script>

const supabaseClient = window.supabase.createClient(
'https://lqxbkppnpxoqjmemtzaa.supabase.co',
'sb_publishable_0RjCGW-lRmu_cgVY5J07UA_p48suAeh'
)

async function carregarProdutos(categoria){

let query = supabaseClient
.from('Produtos')
.select('*')

if(categoria){
query = query.eq('categoria', categoria)
}

const { data, error } = await query

if(error){
console.log(error)
return
}

const container = document.getElementById("produtos")
container.innerHTML = ""

data.forEach(produto => {

const card = document.createElement("div")
card.classList.add("produto")

card.innerHTML = `
<img src="${produto.imagem}">
<h3>${produto.nome}</h3>
<p>${produto.descricao}</p>
<p>Marca: ${produto.marca}</p>
<p>Categoria: ${produto.categoria || "Não definida"}</p>
<p><strong>Preço: R$ ${produto.preco}</strong></p>

<a href="https://wa.me/5584981685355?text=Olá%20tenho%20interesse%20no%20produto%20${produto.nome}" target="_blank">
<button class="whatsapp-btn">
Comprar no WhatsApp
</button>
</a>
`

container.appendChild(card)

})

}

carregarProdutos()

</script>

</body>

</html>
