<!DOCTYPE html>
<html>

<head>

<title>Canarinho Imports</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&display=swap" rel="stylesheet">

<style>

body{
font-family: Arial;
background:#f5f5f5;
padding:40px;
}

h1{
font-family:'Montserrat', sans-serif;
font-size:42px;
}

.categoria-btn{
width:120px;
height:120px;
border-radius:50%;
border:none;
background:#FFD400;
font-weight:bold;
margin:10px;
cursor:pointer;
font-size:16px;
}

.categoria-btn:hover{
transform:scale(1.05);
}

.produto{
border:1px solid #ddd;
padding:15px;
margin:10px;
background:white;
width:250px;
display:inline-block;
vertical-align:top;
}

.produto img{
width:100%;
}

.whatsapp-btn{
padding:10px;
background:#25D366;
color:white;
border:none;
cursor:pointer;
width:100%;
}

</style>

</head>

<body>

<h1>Canarinho Imports</h1>

<p>Chuteiras, camisas de time e produtos esportivos</p>

<button class="categoria-btn" onclick="carregarProdutos()">Todos</button>

<button class="categoria-btn" onclick="carregarProdutos('Camisas')">
Camisas
</button>

<button class="categoria-btn" onclick="carregarProdutos('Chuteiras')">
Chuteiras
</button>

<button class="categoria-btn" onclick="carregarProdutos('Acessórios')">
Acessórios
</button>

<br><br>

<div id="produtos"></div>

<script>

const supabaseClient = window.supabase.createClient(
'https://lqxbkppnpxoqjmemtzaa.supabase.co',
'sb_publishable_0RjCGW-lRmu_cgVY5J07UA_p48suAeh'
)

async function carregarProdutos(categoria){

let query = supabaseClient
.from('Produtos')
.select('*')

if(categoria){
query = query.eq('categoria', categoria)
}

const { data, error } = await query

if(error){
console.log(error)
return
}

const container = document.getElementById("produtos")
container.innerHTML = ""

data.forEach(produto => {

const card = document.createElement("div")
card.classList.add("produto")

card.innerHTML = `
<img src="${produto.imagem}">
<h3>${produto.nome}</h3>
<p>${produto.descricao}</p>
<p>Marca: ${produto.marca}</p>
<p>Categoria: ${produto.categoria}</p>
<p>Preço: R$ ${produto.preco}</p>

<a href="https://wa.me/5584981685355?text=Olá%20tenho%20interesse%20no%20produto%20${produto.nome}" target="_blank">
<button class="whatsapp-btn">
Comprar no WhatsApp
</button>
</a>
`

container.appendChild(card)

})

}

carregarProdutos()

</script>

</body>

</html>

</body>
</html>
